

spring:
  application:
    name: faultmap

  # ── Database ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:faultmap}
    username: ${DB_USER:faultmap}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create-drop          # use Flyway in prod; create-drop for early dev
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Security ──────────────────────────────────────────────────────────────
  security:
    user:
      name: ${FAULTMAP_ADMIN_USER:admin}
      password: ${FAULTMAP_ADMIN_PASS:changeme}

# ── Faultmap custom config ──────────────────────────────────────────────────
faultmap:
  # GitHub OAuth App credentials for repo access
  github:
    app-id: ${GITHUB_APP_ID:}
    private-key-path: ${GITHUB_PRIVATE_KEY_PATH:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    token: ${GITHUB_TOKEN:}

  # Scan engine settings
  scan:
    # Max file size to scan (bytes) — skip large binaries/generated files
    max-file-size-bytes: 524288       # 512 KB
    # File extensions to include in Core scanner
    include-extensions:
      - .java
      - .kt
      - .py
      - .js
      - .ts
      - .yml
      - .yaml
      - .properties
      - .env
      - .json
      - .xml
      - .gradle
      - .toml
      - .tf
      - .sh
    # Paths to always exclude
    exclude-paths:
      - node_modules/
      - .git/
      - target/
      - build/
      - dist/
      - .mvn/

  # Pattern registry location
  patterns:
    secrets-file: classpath:patterns/secrets.yml

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when_authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    io.faultmap: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

server:
  port: 8082