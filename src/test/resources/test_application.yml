
spring:
  datasource:
    url: jdbc:h2:mem:faultmap_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  # Disable security during tests so HTTP endpoints are accessible
  security:
    user:
      name: test
      password: test

# Silence Faultmap logs during test runs
logging:
  level:
    io.faultmap: WARN
    org.springframework: WARN

