# ─────────────────────────────────────────────────────────────────────────────
# Faultmap Pattern Registry — secrets.yml
#
# Every pattern in this file is a potential scan rule for the Core scanner.
# Adding a new secret type = adding a new entry here. No code changes needed.
#
# Fields per entry:
#   id          : unique rule ID (SCREAMING_SNAKE_CASE)
#   name        : human-readable name shown in dashboard
#   description : what this secret is and why it's dangerous
#   pattern     : Java regex pattern — must have at least one capture group
#   severity    : CRITICAL | HIGH | MEDIUM | LOW
#   category    : SECRETS | VULNERABLE_CRYPTO_ALGORITHM | MISCONFIGURATION
#   regulations : list of regulatory references that apply
#     - framework : short name of the regulation
#       article   : specific article/section
#       obligation: plain-English obligation being violated
#       docUrl    : link to the official document
# ─────────────────────────────────────────────────────────────────────────────

patterns:

  # ── AWS ──────────────────────────────────────────────────────────────────

  - id: AWS_ACCESS_KEY
    name: AWS Access Key ID
    description: >
      An AWS Access Key ID was found in the repository. If this key is active,
      an attacker with access to the repo can use it to authenticate to AWS
      and access any services the associated IAM user or role can access.
    pattern: "(?i)(aws_access_key_id|aws_key|AKIA)[\\s:='\"`]+([A-Z0-9]{20})"
    severity: CRITICAL
    category: SECRETS
    regulations:
      - framework: NDPC 2023
        article: Article 26(1)
        obligation: >
          Data controllers must implement appropriate technical measures to
          prevent unauthorised access to systems processing personal data.
        docUrl: https://ndpc.gov.ng/

      - framework: CBN Cybersecurity Framework
        article: Section 4.3
        obligation: >
          Financial institutions must ensure that access credentials are not
          exposed in any form accessible to unauthorised parties.
        docUrl: https://www.cbn.gov.ng/

  - id: AWS_SECRET_KEY
    name: AWS Secret Access Key
    description: >
      An AWS Secret Access Key was found. This is the password component of
      AWS credentials. Combined with the Access Key ID, an attacker has full
      programmatic access to AWS services.
    pattern: "(?i)(aws_secret_access_key|aws_secret)[\\s:='\"`]+([A-Za-z0-9/+=]{40})"
    severity: CRITICAL
    category: SECRETS
    regulations:
      - framework: NDPC 2023
        article: Article 26(1)
        obligation: >
          Data controllers must implement appropriate technical measures to
          prevent unauthorised access to systems processing personal data.
        docUrl: https://ndpc.gov.ng/

      - framework: CBN Cybersecurity Framework
        article: Section 4.3
        obligation: >
          Financial institutions must ensure access credentials are protected.
        docUrl: https://www.cbn.gov.ng/

  # ── Database ──────────────────────────────────────────────────────────────

  - id: DATABASE_PASSWORD
    name: Database Password in Config
    description: >
      A database password was found hardcoded in a config file or source code.
      This gives anyone with repo access direct access to the database,
      bypassing all application-level authentication.
    pattern: "(?i)(db_pass|database_password|db_password|jdbc\\.password|spring\\.datasource\\.password)[\\s:='\"`]+([^\\s'\"\\n]{6,})"
    severity: CRITICAL
    category: SECRETS
    regulations:
      - framework: NDPC 2023
        article: Article 26(1)
        obligation: >
          Data controllers must implement appropriate technical and
          organisational measures to protect personal data against
          accidental or unlawful access.
        docUrl: https://ndpc.gov.ng/

      - framework: PCI-DSS v4
        article: Requirement 8.6.1
        obligation: >
          All system components are protected from misuse by ensuring
          passwords and passphrases are not hardcoded in scripts or source code.
        docUrl: https://www.pcisecuritystandards.org/

  # ── JWT ───────────────────────────────────────────────────────────────────

  - id: JWT_SECRET
    name: JWT Secret Key
    description: >
      A JWT signing secret was found. This secret is used to sign and verify
      JSON Web Tokens. An attacker with this secret can forge valid JWT tokens
      and impersonate any user, including administrators.
    pattern: "(?i)(jwt_secret|jwt_signing_key|jwt_key|token_secret)[\\s:='\"`]+([^\\s'\"\\n]{12,})"
    severity: CRITICAL
    category: SECRETS
    regulations:
      - framework: CBN Cybersecurity Framework
        article: Section 4.3
        obligation: >
          Authentication credentials must be protected from exposure
          to prevent identity spoofing and session hijacking.
        docUrl: https://www.cbn.gov.ng/

  # ── Third-party APIs ──────────────────────────────────────────────────────

  - id: GENERIC_API_KEY
    name: Generic API Key
    description: >
      An API key was found in the repository. API keys grant programmatic
      access to third-party services and should never be stored in source code.
    pattern: "(?i)(api_key|apikey|api_secret|app_secret|client_secret)[\\s:='\"`]+([A-Za-z0-9_\\-]{16,})"
    severity: HIGH
    category: SECRETS
    regulations:
      - framework: NDPC 2023
        article: Article 26(1)
        obligation: >
          Personal data must be protected by appropriate technical measures
          including access controls and secure credential management.
        docUrl: https://ndpc.gov.ng/

  # ── Misconfigurations ─────────────────────────────────────────────────────

  - id: DEBUG_MODE_PRODUCTION
    name: Debug Mode Enabled in Production Config
    description: >
      A production configuration file has debug mode enabled. This can expose
      stack traces, internal error messages, environment variables, and
      application internals to end users or in logs.
    pattern: "(?i)(spring\\.profiles\\.active\\s*=\\s*prod.*\\n.*debug\\s*=\\s*true|debug\\s*=\\s*true.*spring\\.profiles\\.active\\s*=\\s*prod)"
    severity: HIGH
    category: MISCONFIGURATION
    regulations:
      - framework: CBN Cybersecurity Framework
        article: Section 5.1
        obligation: >
          Production systems must not expose diagnostic or debugging
          information that could aid an attacker in exploiting the system.
        docUrl: https://www.cbn.gov.ng/

  # ── Vulnerable crypto algorithms (PQC module uses extended version) ───────

  - id: RSA_ALGORITHM_HARDCODED
    name: RSA Algorithm Hardcoded in Source
    description: >
      RSA is hardcoded as a string literal in cryptographic code. This makes
      the codebase non-crypto-agile and will require a code change (not just
      a config change) to migrate to a post-quantum safe algorithm.
    pattern: "(?i)KeyPairGenerator\\.getInstance\\(['\"]RSA['\"]\\)|Cipher\\.getInstance\\(['\"]RSA"
    severity: MEDIUM
    category: VULNERABLE_CRYPTO_ALGORITHM
    regulations:
      - framework: NIST FIPS 203
        article: Migration guidance
        obligation: >
          Organisations should begin inventorying RSA usage and planning
          migration to ML-KEM (CRYSTALS-Kyber) as per NIST PQC standards.
        docUrl: https://csrc.nist.gov/pubs/fips/203/final

      - framework: CBN Cybersecurity Framework
        article: Section 3.1
        obligation: >
          Financial institutions must maintain cryptographic controls
          aligned with current industry standards and best practices.
        docUrl: https://www.cbn.gov.ng/
